  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

11px;letter-spacing:1.5px;color:#5f7a6e\">NETWORK<\u002Fspan><span style=\"font-size:19px;font-weight:700;color:{{ accent }}\">{{ host.net.disp }}<\u002Fspan><\u002Fdiv>\n          <svg viewBox=\"0 0 100 34\" preserveAspectRatio=\"none\" style=\"width:100%;height:52px;display:block\"><polygon points=\"{{ host.net.area }}\" fill=\"{{ accent }}\" fillopacity=\".1\"><\u002Fpolygon><polyline points=\"{{ host.net.line }}\" fill=\"none\" stroke=\"{{ accent }}\" strokewidth=\"1.4\" vectoreffect=\"non-scaling-stroke\" style=\"filter:drop-shadow(0 0 3px {{ accent }})\"><\u002Fpolyline><\u002Fsvg>\n          <div style=\"font-size:10.5px;color:#3a4d45\">aggregate rx + tx across bridge<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- DISK ring -->\n        <div style=\"background:#0f1512;border:1px solid #1c2823;border-radius:8px;padding:18px;display:flex;align-items:center;gap:16px\">\n          <div style=\"position:relative;width:104px;height:104px;flex:none\">\n            <svg viewBox=\"0 0 100 100\" style=\"width:104px;height:104px\"><circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"#16211c\" strokewidth=\"9\"><\u002Fcircle><circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"{{ host.disk.color }}\" strokewidth=\"9\" strokelinecap=\"round\" strokedasharray=\"251.3\" strokedashoffset=\"{{ host.disk.ringOffset }}\" transform=\"rotate(-90 50 50)\" style=\"transition:stroke-dashoffset .9s linear;filter:drop-shadow(0 0 4px {{ host.disk.color }})\"><\u002Fcircle><\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:{{ host.disk.color }}\">{{ host.disk.disp }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div><div style=\"font-size:11px;letter-spacing:1.5px;color:#5f7a6e\">DISK<\u002Fdiv><div style=\"font-size:10.5px;color:#3a4d45;margin-top:4px\">/var/lib/docker<\u002Fdiv><svg viewBox=\"0 0 100 24\" preserveAspectRatio=\"none\" style=\"width:100%;height:22px;margin-top:8px\"><polyline points=\"{{ host.disk.line }}\" fill=\"none\" stroke=\"{{ host.disk.color }}\" strokewidth=\"1.4\" vectoreffect=\"non-scaling-stroke\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:10px;letter-spacing:2px;color:#5f7a6e;margin:0 2px 12px\">CONTAINERS · {{ runningStr }}<\u002Fdiv>\n\n      <!-- container cards grid -->\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n        <sc-for list=\"{{ containers }}\" as=\"c\" hint-placeholder-count=\"9\">\n          <div style=\"background:#0f1512;border:1px solid {{ c.cardBorder }};border-radius:8px;padding:14px 15px;opacity:{{ c.cardOpacity }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between\">\n              <div style=\"display:flex;align-items:center;gap:9px;overflow:hidden\">\n                <span style=\"width:8px;height:8px;border-radius:50%;background:{{ c.dot }};box-shadow:0 0 5px {{ c.dot }};flex:none\">&nbsp;<\u002Fspan>\n                <span style=\"font-size:13px;font-weight:700;color:{{ c.nameColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:10px;color:{{ c.statusColor }};flex:none;margin-left:8px\">{{ c.statusText }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:10px;color:#3a4d45;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.image }}<\u002Fdiv>\n            <svg viewBox=\"0 0 100 34\" preserveAspectRatio=\"none\" style=\"width:100%;height:40px;display:block;margin:10px 0\"><polygon points=\"{{ c.area }}\" fill=\"{{ c.lineColor }}\" fillopacity=\".09\"><\u002Fpolygon><polyline points=\"{{ c.line }}\" fill=\"none\" stroke=\"{{ c.lineColor }}\" strokewidth=\"1.4\" vectoreffect=\"non-scaling-stroke\"><\u002Fpolyline><\u002Fsvg>\n            <div style=\"display:flex;flex-direction:column;gap:7px;margin-top:2px\">\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px\"><span style=\"color:#5f7a6e\">CPU<\u002Fspan><span style=\"color:{{ c.cpuColor }};font-weight:600\">{{ c.cpuStr }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:4px;background:#16211c;border-radius:2px;overflow:hidden\"><div style=\"height:100%;width:{{ c.cpuPct }}%;background:{{ c.cpuColor }};transition:width .9s linear\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px\"><span style=\"color:#5f7a6e\">MEM<\u002Fspan><span style=\"color:{{ c.memColor }};font-weight:600\">{{ c.memStr }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:4px;background:#16211c;border-radius:2px;overflow:hidden\"><div style=\"height:100%;width:{{ c.memPct }}%;background:{{ c.memColor }};transition:width .9s linear\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:10px;color:#5f7a6e;margin-top:1px\"><span>NET<\u002Fspan><span style=\"color:#8fb3a2\">{{ c.netStr }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- logs -->\n      <div style=\"margin-top:18px;background:#0b0f0d;border:1px solid #1c2823;border-radius:8px;overflow:hidden\">\n        <div style=\"display:flex;justify-content:space-between;padding:9px 15px;border-bottom:1px solid #16211c;font-size:10px;letter-spacing:1.5px;color:#5f7a6e\">EVENT STREAM<span style=\"color:#3a4d45\">docker events · tail -f<\u002Fspan><\u002Fdiv>\n        <div data-logstream=\"b\" style=\"height:158px;overflow-y:auto;padding:8px 15px;font-size:11.5px;line-height:1.72\">\n          <sc-for list=\"{{ logs }}\" as=\"l\" hint-placeholder-count=\"10\">\n            <div style=\"display:flex;gap:11px;white-space:pre;overflow:hidden\">\n              <span style=\"color:#3a4d45;flex:none\">{{ l.time }}<\u002Fspan>\n              <span style=\"color:{{ l.levelColor }};flex:none;width:44px;font-weight:600\">{{ l.level }}<\u002Fspan>\n              <span style=\"color:{{ accent }};flex:none;width:110px;overflow:hidden;text-overflow:ellipsis\">{{ l.name }}<\u002Fspan>\n              <span style=\"color:#8fb3a2;overflow:hidden;text-overflow:ellipsis\">{{ l.msg }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot;},\n  &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#46e08a&quot;, &quot;options&quot;: [&quot;#46e08a&quot;, &quot;#4fd6c9&quot;, &quot;#e8b23a&quot;, &quot;#8b5cf6&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;},\n  &quot;scanlines&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Theme&quot;},\n  &quot;hostname&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;homelab&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;},\n  &quot;tickMs&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1500, &quot;min&quot;: 600, &quot;max&quot;: 4000, &quot;step&quot;: 100, &quot;unit&quot;: &quot;ms&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Behavior&quot;}\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.H = 48;\n    this.cores = 8;\n    this._lid = 0;\n    this.LOG = {\n      'traefik':[['info','level=info msg=\"Configuration reloaded from provider docker\"'],['info','level=info msg=\"Creating server\" entryPoint=websecure']],\n      'postgres':[['info','LOG:  checkpoint complete: wrote 214 buffers (1.3%)'],['warn','WARNING:  autovacuum of table \"public.events\" is taking long'],['info','LOG:  database system is ready to accept connections']],\n      'redis':[['info','Background saving started by pid 41'],['info','DB saved on disk'],['info','1 changes in 900 seconds. Saving...']],\n      'grafana':[['info','logger=context msg=\"Request Completed\" status=200 dur=8ms'],['warn','logger=plugins msg=\"Plugin update available\" id=piechart']],\n      'prometheus':[['info','msg=\"Completed loading of configuration file\" totalDuration=41ms'],['warn','msg=\"Error on ingesting out-of-order samples\" num_dropped=2']],\n      'minio':[['info','API: SYSTEM.internal PutObject bucket=backups OK'],['info','Healing: scan complete for 1 object']],\n      'worker-queue':[['info','job=email.send status=done dur=42ms'],['error','job=report.build status=failed retry=2 err=\"timeout\"'],['info','job=thumb.generate status=done dur=118ms']],\n      'nginx-proxy':[['info','GET /healthz 200 1ms'],['info','GET /api/v1/stats 200 6ms client=10.0.0.4']],\n    };\n    const rnd = n => Math.random()*n;\n    const hex = n => Array.from({length:n},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');\n    const base = [\n      ['traefik','traefik:v3.0',true,6,48,512,120,80],\n      ['postgres','postgres:16-alpine',true,14,310,1024,60,220],\n      ['redis','redis:7-alpine',true,4,64,256,40,55],\n      ['grafana','grafana/grafana:11.1.0',true,9,220,512,90,70],\n      ['prometheus','prom/prometheus:v2.53',true,22,640,2048,140,110],\n      ['minio','minio/minio:RELEASE.2024',true,5,180,1024,75,320],\n      ['worker-queue','app/worker:1.8.2',true,31,410,1024,50,95],\n      ['nginx-proxy','nginx:1.27-alpine',true,2,28,128,110,60],\n      ['backup-cron','app/backup:0.9',false,0,0,256,0,0],\n      ['vpn-gateway','linuxserver/wireguard',false,0,0,128,0,0],\n    ];\n    const H = this.H;\n    const containers = base.map(b=>{\n      const [name,image,running,cpu,mem,memLimit,rx,tx]=b;\n      const seed = v => Array.from({length:H},()=> running ? Math.max(0, v*(0.7+rnd(0.6))) : 0);\n      return {\n        id: hex(12), name, image, running, memLimit,\n        cpu0:running?cpu:0, mem0:running?mem:0, rx0:running?rx:0, tx0:running?tx:0,\n        cpu:running?cpu:0, mem:running?mem:0, rx:running?rx:0, tx:running?tx:0,\n        block: running ? 8+rnd(30) : 0,\n        pids: running ? Math.floor(4+rnd(40)) : 0,\n        restarts: running ? Math.floor(rnd(3)) : Math.floor(1+rnd(4)),\n        uptimeSec: running ? Math.floor(600+rnd(90000)) : 0,\n        exitedAgo: running ? 0 : Math.floor(30+rnd(4000)),\n        exitCode: running ? 0 : (Math.random()<0.5?0:1),\n        cpuH:seed(cpu), memH:seed(mem), rxH:seed(rx), txH:seed(tx), blkH:seed(rx*1.4),\n      };\n    });\n    this.state = {\n      containers,\n      host:{\n        cpuH: Array.from({length:H},()=>20+rnd(30)),\n        ramH: Array.from({length:H},()=>44+rnd(20)),\n        netH: Array.from({length:H},()=>250+rnd(400)),\n        diskH: Array.from({length:H},()=>16+rnd(6)),\n      },\n      logs: this.seedLogs(containers),\n    };\n  }\n\n  componentDidMount(){ this.connectLive(); this.scrollLogs(); }\n  componentWillUnmount(){ clearInterval(this._t); }\n  componentDidUpdate(prev){\n    if(prev.tickMs !== this.props.tickMs) this.startTimer();\n    this.scrollLogs();\n  }\n  startTimer(){ clearInterval(this._t); this._t = setInterval(()=>this.tick(), this.props.tickMs || 1500); }\n  scrollLogs(){ document.querySelectorAll('[data-logstream]').forEach(el=>{ el.scrollTop = el.scrollHeight; }); }\n\n  connectLive(){\n    const apiHost = this.props.apiHost || location.hostname || '127.0.0.1';\n    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';\n    const httpProtocol = location.protocol === 'https:' ? 'https:' : 'http:';\n    const wsUrl = this.props.wsUrl || `${wsProtocol}//${apiHost}:8000/ws/snapshot`;\n    const snapshotUrl = this.props.snapshotUrl || `${httpProtocol}//${apiHost}:8000/api/snapshot`;\n    let socket;\n    let pollTimer = null;\n\n    const startPolling = () => {\n      if (pollTimer) return;\n      pollTimer = setInterval(async () => {\n        try {\n          const res = await fetch(snapshotUrl);\n          if (res.ok) this.applySnapshot(await res.json());\n        } catch (err) {\n          // stay silent; next poll will retry\n        }\n      }, this.props.tickMs || 1500);\n    };\n\n    const stopPolling = () => {\n      if (pollTimer) {\n        clearInterval(pollTimer);\n        pollTimer = null;\n      }\n    };\n\n    const connect = () => {\n      try {\n        socket = new WebSocket(wsUrl);\n      } catch (err) {\n        startPolling();\n        return;\n      }\n      socket.onopen = () => stopPolling();\n      socket.onmessage = (event) => {\n        this.applySnapshot(JSON.parse(event.data));\n      };\n      socket.onclose = () => {\n        startPolling();\n        setTimeout(connect, this.props.tickMs || 1500);\n      };\n      socket.onerror = () => socket.close();\n    };\n\n    connect();\n  }\n\n  applySnapshot(snapshot){\n    const H = this.H;\n    const pushH = (arr, v) => { const n = (arr || []).concat([v]); return n.length > H ? n.slice(n.length - H) : n; };\n\n    this.setState(s=>{\n      // --- host ---\n      const prevHost = s.host || {};\n      const host = {\n        cpuH: pushH(prevHost.cpuH, snapshot.host.cpu_pct),\n        ramH: pushH(prevHost.ramH, snapshot.host.mem_pct),\n        netH: pushH(prevHost.netH, snapshot.host.net_rate_kbps),\n        diskH: pushH(prevHost.diskH, snapshot.host.disk_pct),\n      };\n\n      // --- containers: merge by id, keep existing history ---\n      const byId = new Map((s.containers || []).map(c => [c.id, c]));\n      const containers = snapshot.containers.map(c => {\n        const existing = byId.get(c.id) || {\n          id: c.id,\n          memLimit: c.mem_limit_mb,\n          cpu0: c.cpu_pct, mem0: c.mem_used_mb, rx0: c.net_rx_kbps, tx0: c.net_tx_kbps,\n          cpuH: [], memH: [], rxH: [], txH: [], blkH: [],\n        };\n        return {\n          ...existing,\n          name: c.name,\n          image: c.image,\n          running: c.state === 'running',\n          memLimit: c.mem_limit_mb,\n          exitCode: c.exit_code,\n          uptimeSec: c.uptime_sec,\n          exitedAgo: c.exited_ago_sec,\n          restarts: c.restarts,\n          pids: c.pids,\n          cpu: c.cpu_pct,\n          mem: c.mem_used_mb,\n          rx: c.net_rx_kbps,\n          tx: c.net_tx_kbps,\n          block: c.block_kbps,\n          cpuH: pushH(existing.cpuH, c.cpu_pct),\n          memH: pushH(existing.memH, c.mem_used_mb),\n          rxH: pushH(existing.rxH, c.net_rx_kbps),\n          txH: pushH(existing.txH, c.net_tx_kbps),\n          blkH: pushH(existing.blkH, c.block_kbps),\n        };\n      });\n\n      // --- events -> log lines ---\n      const logs = (snapshot.events || []).reduce((acc, e) => acc.concat([{\n        id: this._lid++,\n        time: (e.ts || '').slice(11, 19),\n        level: e.level,\n        name: e.container,\n        msg: e.message,\n      }]), s.logs || []).slice(-220);\n\n      return { containers, host, logs };\n    });\n  }\n\n  jit(v,target,noise,min,max){\n    let n = v + (target-v)*0.14 + (Math.random()-0.5)*noise;\n    return Math.min(max, Math.max(min, n));\n  }\n  fmtMem(mb){ return mb>=1024 ? (mb/1024).toFixed(2)+' GiB' : mb.toFixed(0)+' MiB'; }\n  fmtRate(kb){ return kb>=1024 ? (kb/1024).toFixed(1)+' MB/s' : kb.toFixed(0)+' kB/s'; }\n  fmtUp(s){ s=Math.floor(s); const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),ss=Math.floor(s%60);\n    if(d>0) return d+'d '+h+'h'; if(h>0) return h+'h '+m+'m'; if(m>0) return m+'m '+ss+'s'; return ss+'s'; }\n\n  seedLogs(containers){ this._lid=0; let logs=[]; const run=containers.filter(c=>c.running); for(let i=0;i<16;i++) logs=this.appendLog(logs,run); return logs; }\n  appendLog(logs, run){\n    if(!run.length) return logs;\n    const c = run[Math.floor(Math.random()*run.length)];\n    const pool = this.LOG[c.name] || [['info','heartbeat ok']];\n    const pick = pool[Math.floor(Math.random()*pool.length)];\n    const d = new Date();\n    const t = [d.getHours(),d.getMinutes(),d.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');\n    return logs.concat([{id:this._lid++, time:t, level:pick[0], name:c.name, msg:pick[1]}]).slice(-220);\n  }\n\n  tick(){\n    this.setState(s=>{\n      const push=(a,v)=>{ const n=a.slice(1); n.push(v); return n; };\n      const last=a=>a[a.length-1];\n      const containers = s.containers.map(c=>{\n        if(!c.running) return {...c, exitedAgo:c.exitedAgo+ (this.props.tickMs||1500)/1000};\n        const cpu=this.jit(c.cpu,c.cpu0,c.cpu0*0.6+2,0,c.cpu0*3+6);\n        const mem=this.jit(c.mem,c.mem0,c.mem0*0.05+4,0,c.memLimit);\n        const rx=this.jit(c.rx,c.rx0,c.rx0*0.5+18,0,c.rx0*4+60);\n        const tx=this.jit(c.tx,c.tx0,c.tx0*0.5+18,0,c.tx0*4+60);\n        const pids=Math.max(1,Math.round(this.jit(c.pids,c.pids,1.4,1,300)));\n        const blk=this.jit(c.block,c.rx0*1.4+10,20,0,c.rx0*5+80);\n        return {...c, cpu,mem,rx,tx,pids, block:blk, uptimeSec:c.uptimeSec+(this.props.tickMs||1500)/1000,\n          cpuH:push(c.cpuH,cpu), memH:push(c.memH,mem), rxH:push(c.rxH,rx), txH:push(c.txH,tx), blkH:push(c.blkH,blk)};\n      });\n      const host={\n        cpuH: push(s.host.cpuH, this.jit(last(s.host.cpuH),30,9,3,96)),\n        ramH: push(s.host.ramH, this.jit(last(s.host.ramH),52,5,20,92)),\n        netH: push(s.host.netH, this.jit(last(s.host.netH),420,220,20,1500)),\n        diskH: push(s.host.diskH, this.jit(last(s.host.diskH),17,1,10,95)),\n      };\n      const run = containers.filter(c=>c.running);\n      let logs = s.logs;\n      if(Math.random()<0.85) logs = this.appendLog(logs, run);\n      if(Math.random()<0.3)  logs = this.appendLog(logs, run);\n      return {containers, host, logs};\n    });\n  }\n\n  spark(arr){\n    const max=Math.max.apply(null,arr.concat([1])), min=Math.min.apply(null,arr.concat([0]));\n    const rng=(max-min)||1;\n    const pts=arr.map((v,i)=>{ const x=(i/(arr.length-1))*100; const y=33-((v-min)/rng)*30; return x.toFixed(1)+','+y.toFixed(1); });\n    const line=pts.join(' ');\n    return {line, area:line+' 100,34 0,34'};\n  }\n\n  renderVals(){\n    const s=this.state, H=this.H;\n    const GREEN=this.props.accent||'#46e08a', AMBER='#e8b23a', RED='#e8555f', DIM='#5f7a6e';\n    const clr=v=> v<60?GREEN : v<85?AMBER : RED;\n    const zero=new Array(H).fill(0);\n\n    const mk=(arr,isPct,sub2)=>{ const v=arr[arr.length-1], sp=this.spark(arr); const pct=isPct?v:Math.min(100,v/14);\n      return {disp:isPct?Math.round(v)+'%':this.fmtRate(v), color:isPct?clr(v):GREEN, line:sp.line, area:sp.area,\n        ringOffset:(251.3*(1-pct/100)).toFixed(1), sub2:sub2||'' }; };\n    const host={\n      cpu:mk(s.host.cpuH,true,'host · '+this.cores+' cores'),\n      ram:mk(s.host.ramH,true,Math.round(s.host.ramH[H-1])+'% of total'),\n      disk:mk(s.host.diskH,true,'/var/lib/docker'),\n      net:mk(s.host.netH,false),\n    };\n\n    const containers = s.containers.map(c=>{\n      const memPct = c.memLimit ? (c.mem/c.memLimit*100) : 0;\n      const sp = this.spark(c.running?c.cpuH:zero);\n      return {\n        id:c.id, name:c.name, image:c.image, running:c.running,\n        dot: c.running?GREEN:(c.exitCode===0?DIM:RED),\n        statusText: c.running ? 'up '+this.fmtUp(c.uptimeSec)\n                    : 'exited ('+c.exitCode+') '+this.fmtUp(c.exitedAgo)+' ago',\n        statusColor: c.running?GREEN:DIM,\n        nameColor: c.running?'#e6f4ec':'#5f7a6e',\n        cpuStr: c.cpu.toFixed(1)+'%', cpuPct: Math.min(100,c.cpu).toFixed(1), cpuColor: c.running?clr(c.cpu):DIM,\n        memStr: this.fmtMem(c.mem), memPct: Math.min(100,memPct).toFixed(1), memColor: c.running?clr(memPct):DIM,\n        netStr: '↓'+this.fmtRate(c.rx)+'  ↑'+this.fmtRate(c.tx),\n        line: sp.line, area: sp.area, lineColor: c.running?GREEN:'#2a3d34',\n        cardBorder: '#1c2823',\n        cardOpacity: c.running?'1':'.55',\n      };\n    });\n\n    const logs = s.logs.map(l=>({ id:l.id, time:l.time, level:l.level.toUpperCase(),\n      levelColor: l.level==='error'?RED : l.level==='warn'?AMBER : GREEN, name:l.name, msg:l.msg }));\n\n    const running = s.containers.filter(c=>c.running).length;\n    return {\n      host, containers, logs,\n      accent:GREEN, accentGlow:GREEN+'80', scanlineOpacity: (this.props.scanlines!==false)?'.05':'0',\n      hostLabel: (this.props.hostname||'homelab')+' · engine 27.1.1',\n      runningStr: running+'/'+s.containers.length,\n      tickLabel: ((this.props.tickMs||1500)/1000).toFixed(1)+'s',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
