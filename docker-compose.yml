services:
  dockerd-view-backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DOCKER_SOCK: /var/run/docker.sock
      SAMPLE_INTERVAL_MS: "1500"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8000"
      PORT: "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
